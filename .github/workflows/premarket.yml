name: Build and deploy premarket watchlist

on:
  schedule:
    # GitHub cron uses UTC.
    # 03:05, 03:25, 03:35, 03:40 UTC =
    # 08:35, 08:55, 09:05, 09:10 IST.
    - cron: "5 3 * * 1-5"
    - cron: "25 3 * * 1-5"
    - cron: "35 3 * * 1-5"
    - cron: "40 3 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build watchlist
        env:
          MAX_UNIVERSE: "500"
          TOP_N: "10"
        run: python src/scan.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
